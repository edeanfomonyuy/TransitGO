<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TransitGO</title>
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/contact.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p>TransitGo</p>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-page">
        <section class="contact-hero">
            <div class="contact-hero__overlay">
                <h1>Contact TransitGO</h1>
                <p>Have a question? Send us a message and we’ll get back to you within 24 hours.</p>
            </div>
        </section>

        <section class="contact-form-section">
            <div class="contact-form">
                <h2>Send us a message</h2>
                <form>
                    <div class="input-grid">
                        <input type="text" name="name" placeholder="Name & Surname" required>
                        <input type="email" name="email" placeholder="E-Mail Address" required>
                        <input type="text" name="subject" placeholder="Subject" required>
                        <input type="text" name="order" placeholder="Order ID (optional)">
                    </div>
                    <textarea name="message" rows="5" placeholder="Message" required></textarea>
                    <button type="submit" class="send-btn">SEND</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
