<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TransitGO</title>
    <link rel="stylesheet" href="../assets/css/navbar.css">
    <link rel="stylesheet" href="../assets/css/signup.css">
</head>
<body>
    
       <header>
        <nav>
            <div class="logo">
                <p>TransitGo</p>
            </div>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li> 
                <li><a href="contact.html">Contact Us</a></li>          
            </ul>
        </nav>
    </header>
       
     <main>  
     <div class="image-container">
            <img src="../assets/images/image13.jpg" alt="Bus images"/>
        </div>
        <form action="">
            <h1>Sign Up Form</h1>
            <div class="input-group">
                <label for="name"></label>
                <input id="name" type="name" placeholder="Name">
            </div>
            <div class="input-group">
                <label for="sur-name"></label>
                <input id="sur-name" type="sur-name" placeholder="Sur-Name">
            </div>
            <div class="input-group">
                <label for="email"></label>
                <input id="email" type="email" placeholder="Email addres">
            </div>
            <div class="input-group">
                <label for="password"></label>
                <input id="password" type="password" placeholder="password">
            </div>
            <div class="checkbox-group">
                <input id="terms-conditions" type="checkbox">
                <label for="terms-conditions">Agree Terms & Conditions</label>
            </div>
        
            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
    </main>
    
</body>
</html>
